<html lang="en">

<head>

  <title>Our Menu - Little Village Multi Cuisine Restaurant</title>
  <link rel="shortcut icon" href="./assets/images/Little Village/littlelogo.png" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      /* Background Image Implementation */
      background: url('./assets/images/lvbg.png') no-repeat center center fixed;
      background-size: cover;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .menu-page {
      padding-block-start: 140px;
      padding-block-end: 120px;
      padding-inline: 16px;
      flex: 1;
    }

    /* Redesigned Navigation Controls Row */
    .menu-controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
      background: rgba(20, 20, 20, 0.8);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    @media (min-width: 992px) {
      .menu-controls {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }

    /* Category Navigation Tabs */
    .category-tabs {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 5px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex: 1;
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-btn {
      color: var(--accent-wheat);
      font-family: var(--fontFamily-forum);
      font-size: 1.5rem;
      padding: 8px 18px;
      transition: var(--transition-1);
      white-space: nowrap;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    .category-btn:hover,
    .category-btn.active {
      color: #ffffff;
      background: var(--clay-orange);
      border-color: var(--clay-orange);
    }

    /* Interactive Sorting Dropdown element */
    .sort-container {
      display: flex;
      align-items: center;
      gap: 10px;
      align-self: flex-start;
      flex-shrink: 0;
    }

    .sort-label {
      color: var(--accent-wheat);
      font-size: 1.4rem;
      font-family: var(--fontFamily-dmSans);
      white-space: nowrap;
    }

    .sort-select {
      background: rgba(30, 30, 30, 0.95);
      color: var(--accent-wheat);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 1.4rem;
      font-family: var(--fontFamily-dmSans);
      outline: none;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .sort-select:focus {
      border-color: var(--clay-orange);
    }

    /* Premium Menu Display Card Layouts */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .menu-item {
      background: linear-gradient(165deg, rgba(35, 35, 35, 0.85), rgba(20, 20, 20, 0.95));
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
    }

    .menu-item:hover {
      transform: translateY(-5px);
      border-color: var(--clay-orange);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
    }

    .item-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .item-title {
      font-family: var(--fontFamily-forum);
      font-size: 2rem;
      color: var(--accent-wheat);
      line-height: 1.3;
    }

    .item-badge-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .item-price {
      color: var(--clay-orange);
      font-size: 1.8rem;
      font-weight: bold;
      white-space: nowrap;
    }

    .must-try-badge {
      background: linear-gradient(90deg, #ff8c00, #e65100);
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    /* Multivariant pricing support rules */
    .multi-price-list {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .multi-price-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.3rem;
      color: var(--quick-silver);
    }

    .multi-price-val {
      color: var(--clay-orange);
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .menu-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .menu-page {
        padding-block-start: 110px;
        padding-inline: 12px;
      }
    }
  </style>
</head>

    let activeSelectedCategory = Object.keys(globalMenuDatabase)[0];

    document.addEventListener('DOMContentLoaded', () => {
      buildCategoryTabsSystem();
      bindInteractiveControls();
      executeGridRender(activeSelectedCategory);
    });

    function buildCategoryTabsSystem() {
      const tabsContainer = document.getElementById('categoryTabs');
      tabsContainer.innerHTML = '';
      
      Object.keys(globalMenuDatabase).forEach((categoryName, index) => {
        const tabButton = document.createElement('button');
        tabButton.className = `category-btn ${index === 0 ? 'active' : ''}`;
        tabButton.textContent = categoryName;
        tabButton.dataset.category = categoryName;
        tabsContainer.appendChild(tabButton);
      });
    }

    function bindInteractiveControls() {
      document.getElementById('categoryTabs').addEventListener('click', (event) => {
        if (event.target.classList.contains('category-btn')) {
          document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
          event.target.classList.add('active');
          activeSelectedCategory = event.target.dataset.category;
          executeGridRender(activeSelectedCategory);
          event.target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      });

      document.getElementById('priceSort').addEventListener('change', () => {
        executeGridRender(activeSelectedCategory);
      });
    }

    function executeGridRender(targetCategoryKey) {
      const gridDOMReference = document.getElementById('menuGrid');
      gridDOMReference.innerHTML = '';
      
      let itemsListClone = [...globalMenuDatabase[targetCategoryKey]];
      const activeSortStrategy = document.getElementById('priceSort').value;

      if (activeSortStrategy === 'low-high') {
        itemsListClone.sort((a, b) => a.price - b.price);
      } else if (activeSortStrategy === 'high-low') {
        itemsListClone.sort((a, b) => b.price - a.price);
      }

      itemsListClone.forEach(item => {
        const itemCard = document.createElement('div');
        itemCard.className = 'menu-item';
        
        let dynamicSubPricesMarkup = '';
        if (item.multiPrices && item.multiPrices.length > 0) {
          dynamicSubPricesMarkup = `<div class="multi-price-list">`;
          item.multiPrices.forEach(subItem => {
            dynamicSubPricesMarkup += `
              <div class="multi-price-row">
                <span>${subItem.label}</span>
                <span class="multi-price-val">₹${subItem.price}</span>
              </div>`;
          });
          dynamicSubPricesMarkup += `</div>`;
        }

        itemCard.innerHTML = `
          <div class="item-content">
            <div class="item-header">
              <h3 class="item-title">${item.name}</h3>
              <div class="item-badge-container">
                <span class="item-price">₹${item.price}</span>
                ${item.mustTry ? `<span class="must-try-badge">Must Try</span>` : ''}
              </div>
            </div>
            ${dynamicSubPricesMarkup}
          </div>
        `;
        gridDOMReference.appendChild(itemCard);
      });
    }
