<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Menu - Little Village Multi Cuisine Restaurant</title>

  <link rel="stylesheet" href="./assets/css/style.css">

  <style>
    .menu-page { padding-block-start: 120px; }

    .category-tabs {
      display: flex;
      overflow-x: auto;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--white-alpha-10);
    }

    .category-btn {
      color: var(--accent-wheat);
      font-family: var(--fontFamily-forum);
      font-size: 2rem;
      padding: 10px 20px;
      white-space: nowrap;
    }

    .category-btn.active {
      color: var(--clay-orange);
      border-bottom: 2px solid var(--clay-orange);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    .menu-item {
      background: linear-gradient(160deg, rgba(48,48,48,0.95), rgba(33,33,33,0.98));
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-1);
      border: 1px solid var(--white-alpha-10);
      transition: 0.25s ease;
    }

    .menu-item:hover {
      transform: translateY(-6px);
      border-color: var(--clay-orange);
    }

    .item-title {
      font-family: var(--fontFamily-forum);
      font-size: 2.2rem;
      color: var(--accent-wheat);
      display: flex;
      justify-content: space-between;
    }

    .item-price { color: var(--clay-orange); font-weight: bold; }

    .item-desc {
      color: var(--quick-silver);
      font-size: 1.4rem;
      margin-block: 6px 10px;
    }

    .add-to-cart-btn {
      background: var(--clay-orange);
      color: white;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
    }

    /* Cart */
    .cart-drawer {
      position: fixed;
      right: -400px;
      top: 0;
      height: 100vh;
      width: 350px;
      background: var(--eerie-black-1);
      transition: 0.4s;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.active { right: 0; }

    .cart-item {
      border-bottom: 1px solid var(--white-alpha-10);
      padding-bottom: 10px;
    }

    .cart-item-name { color: var(--accent-wheat); }
    .cart-item-price { color: var(--clay-orange); }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 2rem;
      margin-top: 20px;
      color: var(--accent-wheat);
    }

    .checkout-btn {
      background: #25D366;
      color: white;
      padding: 15px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
    }

    .cart-overlay-btn {
      position: fixed;
      bottom: 110px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--clay-orange);
      color: white;
      display: grid;
      place-content: center;
      font-size: 2.4rem;
    }

    .cart-count {
      position: absolute;
      top: 0;
      right: 0;
      background: red;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 1.2rem;
      display: grid;
      place-content: center;
    }
  </style>
</head>

<body>

<main class="container menu-page">

<h1 class="headline-1 text-center" style="margin-bottom: 40px;">Our Delicious Menu</h1>

<div class="category-tabs" id="categoryTabs"></div>

<div class="menu-grid" id="menuGrid"></div>

</main>

<div class="cart-overlay-btn" id="cartOverlay">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-drawer" id="cartDrawer">

<div class="cart-header">
<h2>Your Cart</h2>
<span id="drawerClose">&times;</span>
</div>

<div class="cart-items" id="cartItemsList"></div>

<input type="text" id="custName" placeholder="Your Name">
<textarea id="custAddr" placeholder="Address"></textarea>

<div class="cart-total">
<span>Total:</span>
<span id="cartTotalText">₹0</span>
</div>

<button class="checkout-btn" id="whatsappCheckout">Send Order on WhatsApp</button>

</div>

<script>
const MENU_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuQLFksZdpPbHY1M7rG_DzxXpzARHoDv_iUMniPLQ559lqR-q34bcudLFJOyynNyQooMlgTzQAwgEP/pub?gid=0&single=true&output=csv";
const WHATSAPP_NUMBER = "919440159707";

let cart = JSON.parse(localStorage.getItem('lv_cart')) || [];
let activeMenuData = {};

document.addEventListener('DOMContentLoaded', async () => {

  activeMenuData = await loadMenuData();
  renderCategories();

  const firstCategory = Object.keys(activeMenuData)[0];
  if (firstCategory) renderItems(firstCategory);

  updateCartUI();

  cartOverlay.onclick = () => cartDrawer.classList.add('active');
  drawerClose.onclick = () => cartDrawer.classList.remove('active');
  whatsappCheckout.onclick = sendOrderWhatsapp;
});

async function loadMenuData() {
  const res = await fetch(MENU_CSV_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));

  let data = {};

  rows.slice(1).forEach(r => {
    let cat = r[2];
    if (!data[cat]) data[cat] = [];

    data[cat].push({
      id: Number(r[0]),
      name: r[1],
      price: Number(r[3]),
      desc: r[4]
    });
  });

  return data;
}

function renderCategories() {
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = "";

  Object.keys(activeMenuData).forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "category-btn";
    btn.innerText = cat;
    btn.onclick = () => renderItems(cat);
    tabs.appendChild(btn);
  });
}

function renderItems(category) {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = "";

  activeMenuData[category].forEach(item => {
    const div = document.createElement("div");
    div.className = "menu-item";

    div.innerHTML = `
      <div class="item-title">
        <span>${item.name}</span>
        <span class="item-price">₹${item.price}</span>
      </div>
      <p class="item-desc">${item.desc}</p>
      <button class="add-to-cart-btn" onclick="addToCart(${item.id})">Add to Cart</button>
    `;

    grid.appendChild(div);
  });
}

function addToCart(id) {
  let selectedItem;

  for (let cat in activeMenuData) {
    let found = activeMenuData[cat].find(i => i.id === id);
    if (found) selectedItem = found;
  }

  let existing = cart.find(i => i.id === id);
  if (existing) existing.qty++;
  else cart.push({...selectedItem, qty:1});

  updateCartUI();
}

function updateCartUI() {
  localStorage.setItem('lv_cart', JSON.stringify(cart));

  let list = document.getElementById("cartItemsList");
  list.innerHTML = "";

  let total = 0;
  let qty = 0;

  cart.forEach((item,i) => {
    total += item.price * item.qty;
    qty += item.qty;

    list.innerHTML += `
      <div class="cart-item">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₹${item.price} x ${item.qty}</div>
      </div>
    `;
  });

  cartCount.innerText = qty;
  cartTotalText.innerText = "₹" + total;
}

function sendOrderWhatsapp() {
  let name = custName.value;
  let addr = custAddr.value;

  let msg = "*New Order*\\n\\n";
  msg += "Name: " + name + "\\n";
  msg += "Address: " + addr + "\\n\\n";

  cart.forEach(i => {
    msg += `${i.name} x ${i.qty}\\n`;
  });

  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
